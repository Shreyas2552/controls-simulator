plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.controlssimulator'
    compileSdk 34

    defaultConfig {
        applicationId "com.controlssimulator"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug   // debug-signed for sideloading
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    packagingOptions {
        // Keep plotly.min.js uncompressed so WebView can load it efficiently
        doNotCompress "*.js", "*.wasm"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
